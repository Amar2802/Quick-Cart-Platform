<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickCart Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar px-4 py-3 shadow">
  <h4>QuickCart Platform</h4>
  <div>🛒 Bag: <span id="cartMeter">0</span></div>
</nav>

<div class="container mt-4">

  <div class="row mb-3">
    <div class="col-md-4">
      <input type="text" id="finderBox" class="form-control" placeholder="Search product">
    </div>

    <div class="col-md-3">
      <select id="categorySwitch" class="form-select">
        <option value="all">All Categories</option>
      </select>
    </div>

    <div class="col-md-3">
      <select id="priceOrder" class="form-select">
        <option value="none">Sort Price</option>
        <option value="asc">Low → High</option>
      </select>
    </div>
  </div>

  <div id="loadingSignal" class="text-center">Loading...</div>
  <div id="errorSignal" class="text-danger text-center"></div>

  <div class="row" id="productZone"></div>

</div>

<div class="modal fade" id="detailBox" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <div class="modal-header">
        <h5 class="modal-title">Product Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
